<div class="home">

  <section class="hero">
    <div class="hero-content">
      <h1>Sistema de Gestión Hotelera</h1>
      <p>Controla reservas, disponibilidad y estadísticas de ocupación desde un solo lugar.</p>
    </div>
  </section>
  
  <section class="quick-access">
    <h2>Acceso rápido</h2>
    <div class="cards-grid">
      @for (card of quickAccess; track card.link) {
        <a [routerLink]="card.link" class="card">
          <i [class]="card.icon"></i>
          <h3>{{ card.label }}</h3>
          <p>{{ card.description }}</p>
        </a>
      }
    </div>
  </section>

</div>
